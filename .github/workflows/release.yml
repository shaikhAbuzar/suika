name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-24.04
            bun-target: bun-linux-x64
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            bun-target: bun-linux-arm64
          - target: darwin-arm64
            runner: macos-latest
            bun-target: bun-darwin-arm64
          # no free Intel mac runners anymore: cross-compile from the arm runner
          # by fetching the x64 native core that bun install skips
          - target: darwin-x64
            runner: macos-latest
            bun-target: bun-darwin-x64
            cross-core: "@opentui/core-darwin-x64"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - run: bunx tsc --noEmit

      # exercises the real renderer headlessly, including the layout tests
      - run: bun test tests/

      - name: Fetch native core for cross-compile target
        if: matrix.cross-core
        run: |
          VERSION=$(bun -e 'console.log(require("@opentui/core/package.json").version)')
          npm pack "${{ matrix.cross-core }}@${VERSION}"
          mkdir -p "node_modules/${{ matrix.cross-core }}"
          tar -xzf ./*.tgz -C "node_modules/${{ matrix.cross-core }}" --strip-components=1
          rm ./*.tgz

      - name: Build binary
        run: |
          bun build --compile --target=${{ matrix.bun-target }} src/index.tsx \
            --outfile "suika-${{ github.ref_name }}-${{ matrix.target }}"
          file "suika-${{ github.ref_name }}-${{ matrix.target }}" || true

      - uses: actions/upload-artifact@v4
        with:
          name: suika-${{ matrix.target }}
          path: suika-${{ github.ref_name }}-${{ matrix.target }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: suika-*
          generate_release_notes: true
          body: |
            Dual-pane S3 terminal file manager. Download the binary for your
            platform below, `chmod +x` it, and put it on your `PATH` — or build
            from source with Bun (see the README).
